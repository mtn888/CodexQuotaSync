services:
  codex-quota-sync:
    build:
      context: .
      dockerfile: Dockerfile
    image: codex-quota-sync-server:local
    container_name: codex-quota-sync-server
    restart: unless-stopped
    ports:
      - "${CQS_HOST_PORT:-8787}:8787"
    environment:
      PORT: "8787"
      DATA_FILE: /data/state.json
      CQS_WRITE_SECRET: "${CQS_WRITE_SECRET:?请先设置 CQS_WRITE_SECRET}"
      TZ: "${TZ:-Asia/Singapore}"
    volumes:
      - "${CQS_DATA_DIR:-./data}:/data"
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8787/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
